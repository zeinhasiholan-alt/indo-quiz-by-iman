<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indo Quiz | teka-teki acak</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="premium-bg">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="container">
        <nav class="glass-nav">
            <div class="brand">
                <div class="brand-logo">IQ</div>
                <div class="brand-text">
                    <h1>Indo Quiz AI</h1>
                    <p>Experience by Iman Firman</p>
                </div>
            </div>
            <div class="nav-actions">
                <button class="dev-btn" onclick="openDevModal()">👤 Dev</button>
                <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            </div>
        </nav>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">TOTAL SKOR</span>
                <span class="stat-value" id="sv-score">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">AKURASI</span>
                <span class="stat-value" id="sv-acc">0%</span>
            </div>
        </div>

        <main class="quiz-box glass-card" id="quiz-box">
            <div class="quiz-header">
                <div class="category-tag" id="cat-badge">GENERATING AI...</div>
                <div class="progress-info">
                    <span id="prog-text">0/10</span>
                </div>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-fill" id="prog-fill"></div>
            </div>

            <div class="timer-container">
                <div class="timer-line" id="t-line"></div>
            </div>

            <div class="question-area">
                <h2 id="q-text">Menghubungkan ke otak AI Groq...</h2>
                <div class="hint-msg" id="hint-msg"></div>
            </div>

            <div class="options-grid" id="opts-grid"></div>

            <div class="feedback-area" id="fb-toast"></div>

            <div class="footer-actions">
                <button class="btn-hint" onclick="toggleHint()">💡 Hint</button>
                <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>Lanjut →</button>
            </div>
        </main>

        <div class="result-screen glass-card" id="result-screen" style="display: none;">
            <div class="result-header">
                <span class="result-emoji" id="r-emoji">🏁</span>
                <h2 id="r-title">FINISH!</h2>
            </div>
            <div class="result-stats">
                <div class="res-item"><span>Benar</span><b id="rv-cor">0</b></div>
                <div class="res-item"><span>Salah</span><b id="rv-wrg">0</b></div>
                <div class="res-item"><span>Skor Akhir</span><b id="rv-score">0</b></div>
            </div>
            <button class="btn-restart" onclick="restartGame()">🔄 Main Lagi</button>
        </div>
    </div>

    <div class="modal-overlay" id="dev-modal">
        <div class="modal-card glass-card">
            <button class="close-modal" onclick="closeDevModal()">&times;</button>
            <div class="dev-profile">
                <div class="dev-avatar">IF</div>
                <h2>Iman Firman</h2>
                <p>Lead AI Developer</p>
                <div class="dev-tags">
                    <span>Vercel Expert</span>
                    <span>AI Specialist</span>
                    <span>UI/UX Designer</span>
                </div>
                <div class="dev-bio">"Building the future with Groq AI & Premium Design."</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
